{% extends 'base.html' %}
{% block content %}
<section class="grid two">
  <div class="card">
    <h2>KPI Thresholds</h2>
    <div class="list">
      <label>Hospitals per 10k <input type="number" id="th-hosp" value="1.2" /></label>
      <label>Schools per 1k children <input type="number" id="th-sch" value="1.0" /></label>
      <label>Green cover % <input type="number" id="th-green" value="18" /></label>
    </div>
  </div>
  <div class="card">
    <h2>Civic Deficit Weights</h2>
    <div class="list">
      <label>Healthcare <input type="range" min="0" max="1" step="0.05" value="0.25" class="slider" data-key="healthcare"></label>
      <label>Education <input type="range" min="0" max="1" step="0.05" value="0.20" class="slider" data-key="education"></label>
      <label>Roads <input type="range" min="0" max="1" step="0.05" value="0.20" class="slider" data-key="roads"></label>
      <label>Water <input type="range" min="0" max="1" step="0.05" value="0.15" class="slider" data-key="water"></label>
      <label>Green <input type="range" min="0" max="1" step="0.05" value="0.10" class="slider" data-key="green"></label>
      <label>Slum burden <input type="range" min="0" max="1" step="0.05" value="0.10" class="slider" data-key="slum"></label>
    </div>
  </div>
</section>
<section class="card">
  <div class="panel-title">
    <h2>Model Registry</h2>
    <button class="btn" id="saveAdmin">Save</button>
  </div>
  <table class="table">
    <thead><tr><th>Name</th><th>Version</th><th>Status</th></tr></thead>
    <tbody>
      <tr><td>Road-SegNet</td><td>1.0.0</td><td>registered</td></tr>
      <tr><td>Green-UNet</td><td>0.9.1</td><td>registered</td></tr>
    </tbody>
  </table>
</section>
<script src="/static/js/admin.js"></script>
{% endblock %}
