version: '3.9'
services:
  api:
    build: .
    container_name: civicmap-api
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgis/postgis:16-3.4
    container_name: civicmap-db
    environment:
      POSTGRES_DB: civicmap
      POSTGRES_USER: civicmap
      POSTGRES_PASSWORD: civicmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: civicmap-redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
